<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 음료 판매 집계</title>
  <link href="/style.css" rel="stylesheet">
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" aria-pressed="false">Dark Mode</button>
  <main class="app">
    <h1>오늘 팔린 음료 집계</h1>
    <p class="today-label">집계일: <strong id="today-date"></strong></p>

    <section class="sales-card">
      <h2>판매 등록</h2>
      <form id="sales-form" class="sales-form">
        <label>
          음료명
          <input id="drink-name" type="text" placeholder="예: 아메리카노" required />
        </label>
        <label>
          판매 수량
          <input id="drink-count" type="number" min="1" value="1" required />
        </label>
        <button type="submit" class="primary-btn">판매 추가</button>
      </form>
    </section>

    <section class="summary-card">
      <h2>오늘 누적</h2>
      <div class="summary-grid">
        <p>총 판매 수량: <strong id="total-count">0</strong>잔</p>
        <p>음료 종류 수: <strong id="drink-kinds">0</strong>개</p>
      </div>
      <button id="reset-btn" class="danger-btn" type="button">오늘 집계 초기화</button>
    </section>

    <section class="table-card">
      <h2>음료별 판매 현황</h2>
      <table>
        <thead>
          <tr>
            <th>음료명</th>
            <th>판매 수량</th>
          </tr>
        </thead>
        <tbody id="sales-table-body">
          <tr>
            <td colspan="2" class="empty-row">아직 등록된 판매 내역이 없습니다.</td>
          </tr>
        </tbody>
      </table>
    </section>

    <section class="contact-card">
      <h2>제휴 문의</h2>
      <p class="contact-copy">브랜드 협업, 납품, 공동 프로모션 문의를 남겨주세요.</p>
      <form
        id="partnership-form"
        class="contact-form"
        action="https://formspree.io/f/xojnyoab"
        method="POST"
      >
        <input type="hidden" name="_subject" value="새 제휴 문의가 도착했습니다" />
        <label>
          담당자명
          <input name="name" type="text" placeholder="홍길동" required />
        </label>
        <label>
          회사명
          <input name="company" type="text" placeholder="예: ABC F&B" required />
        </label>
        <label>
          이메일
          <input name="email" type="email" placeholder="contact@company.com" required />
        </label>
        <label>
          연락처
          <input name="phone" type="tel" placeholder="010-1234-5678" />
        </label>
        <label>
          문의 내용
          <textarea
            name="message"
            rows="5"
            placeholder="제휴 목적, 예상 일정, 협업 내용을 적어주세요."
            required
          ></textarea>
        </label>
        <button id="partnership-submit" type="submit" class="primary-btn">문의 보내기</button>
        <p id="partnership-status" class="form-status" aria-live="polite"></p>
      </form>
    </section>

    <section class="comments-card">
      <h2>댓글</h2>
      <p class="comment-copy">의견이나 피드백을 자유롭게 남겨주세요.</p>
      <div id="disqus_thread"></div>
      <noscript>
        Please enable JavaScript to view the
        <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a>
      </noscript>
    </section>
  </main>
  <script defer type="text/javascript" src="/main.js"></script>
  <script>
    var disqus_config = function () {
      this.page.url = window.location.href;
      this.page.identifier = 'drink-sales-comments';
    };

    (function() {
      var d = document;
      var s = d.createElement('script');
      s.src = 'https://jooncoding.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      (d.head || d.body).appendChild(s);
    })();
  </script>
</body>
</html>
